<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart AI Chat Assistant</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <!-- ── HEADER ── -->
    <header class="header">
      <div class="header-icon">🤖</div>
      <div class="header-text">
        <h1>Smart AI Assistant</h1>
        <p>Powered by Dhanush Krishna · Cache-enabled</p>
      </div>
      <div class="status-dot" title="Online"></div>
    </header>

    <!-- ── CHAT DISPLAY AREA ── -->
    <main class="chat-area" id="chatArea">

      <!-- Empty / Welcome State -->
      <div class="empty-state" id="emptyState">
        <div class="icon">💬</div>
        <h3>Start a conversation</h3>
        <p>Ask me anything — I remember our chat and cache repeated questions.</p>
        <div class="suggestion-chips">
          <span class="chip" onclick="sendChip('Hello!')">👋 Say hello</span>
          <span class="chip" onclick="sendChip('What is Java?')">☕ What is Java?</span>
          <span class="chip" onclick="sendChip('What is Spring Boot?')">🌱 Spring Boot?</span>
          <span class="chip" onclick="sendChip('Bye!')">👋 Goodbye</span>
        </div>
      </div>

    </main>

    <!-- ── INPUT AREA ── -->
    <div class="input-area">
      <div class="input-wrap">
        <textarea
          id="userInput"
          placeholder="Type a message..."
          rows="1"
          aria-label="Message input"
        ></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send message">
        ➤
      </button>
    </div>

    <!-- Keyboard hint -->
    <div class="footer-hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>

  </div><!-- /.app -->

  <!-- JavaScript -->
  <script src="app.js"></script>

</body>
</html>
